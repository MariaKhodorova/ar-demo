<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AR Cactus Flower</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

  <!-- AR.js -->
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">

<a-scene embedded arjs>

  <!-- Небо -->
  <a-sky id="sky" color="#87CEEB"></a-sky>

  <a-marker preset="hiro">

    <!-- КАКТУС -->
    <a-entity id="cactus"
              geometry="primitive: cylinder; radius: 0.25; height: 1.2"
              material="color: green"
              position="0 0.6 0">
    </a-entity>

    <!-- ЦВЕТОК -->
    <a-entity id="flower"
              geometry="primitive: sphere"
              material="color: pink"
              position="0 1.4 0"
              scale="0 0 0"
              visible="true">
    </a-entity>

    <!-- ФАКТ -->
    <a-text id="fact"
            value="Цветёт только ночью\nцветок живёт один день"
            position="-1 1.5 0"
            color="white"
            align="center"
            visible="false">
    </a-text>

    <!-- ВОПРОС -->
    <a-text id="question"
            value="Почему растению выгодно\nцвести ночью?"
            position="-1 1.5 0"
            color="yellow"
            align="center"
            visible="false">
    </a-text>

    <!-- СВЕТ -->
    <a-light id="light" type="ambient" color="#ffffff"></a-light>

  </a-marker>

  <a-entity camera></a-entity>

</a-scene>

<script>
let flower = document.querySelector("#flower");
let fact = document.querySelector("#fact");
let question = document.querySelector("#question");
let light = document.querySelector("#light");
let sky = document.querySelector("#sky");

// === 1. День (старт) ===
// ничего не делаем — всё уже светлое

// === 2. Наступает ночь ===
setTimeout(() => {
  light.setAttribute("color", "#223344");
  sky.setAttribute("color", "#0b0f2a");
  fact.setAttribute("visible", true);
}, 5000);

// === 3. Цветок расцветает на кактусе ===
setTimeout(() => {
  flower.setAttribute("animation__grow", {
    property: "scale",
    from: "0 0 0",
    to: "1 1 1",
    dur: 4000,
    easing: "easeOutElastic"
  });

  flower.setAttribute("animation__rotate", {
    property: "rotation",
    to: "0 360 0",
    dur: 4000
  });

}, 10000);

// === 4. Увядание ===
setTimeout(() => {
  flower.setAttribute("animation__shrink", {
    property: "scale",
    to: "0.2 0.2 0.2",
    dur: 4000,
    easing: "easeInOutQuad"
  });

  flower.setAttribute("animation__color", {
    property: "material.color",
    to: "#5a2d0c",
    dur: 4000
  });

}, 20000);

// полностью исчезает
setTimeout(() => {
  flower.setAttribute("visible", false);
}, 24000);

// === 5. Новый день ===
setTimeout(() => {
  light.setAttribute("color", "#ffffff");
  sky.setAttribute("color", "#87CEEB");
  fact.setAttribute("visible", false);
}, 30000);

// === 6. Вопрос ===
setTimeout(() => {
  question.setAttribute("visible", true);
}, 35000);

</script>

</body>
</html>
