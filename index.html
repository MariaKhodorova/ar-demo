<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AR Динозавры</title>

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

<style>
.panel {
  position: absolute;
  bottom: 20px;
  left: 10px;
  right: 10px;
  background: white;
  padding: 15px;
  border-radius: 10px;
  display: none;
  font-family: sans-serif;
  text-align: center;
}

button {
  display: block;
  margin: 5px 0;
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 6px;
  background: #4CAF50;
  color: white;
  font-size: 16px;
}

button:hover {
  background: #45a049;
}

#result {
  margin-top: 10px;
  font-weight: bold;
}
</style>
</head>

<body style="margin:0; overflow:hidden;">

<!-- ФАКТ -->
<div id="fact" class="panel">
  <h3>Интересный факт 🌿</h3>
  <p>Гинкго видело динозавров. Ему может быть до 3000 лет!</p>
  <button onclick="showQuiz()">Дальше ➡️</button>
</div>

<!-- ВОПРОС -->
<div id="quiz" class="panel">
  <h3>Что ещё могло жить во времена динозавров?</h3>

  <button onclick="checkAnswer(1)">Крокодилы ✅</button>
  <button onclick="checkAnswer(2)">Кошки</button>
  <button onclick="checkAnswer(3)">Собаки</button>
  <button onclick="checkAnswer(4)">Коровы</button>

  <div id="result"></div>
</div>

<a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">

<a-assets>
  <video id="video" src="dino.mp4" preload="auto" crossorigin="anonymous"></video>
</a-assets>

<a-marker preset="hiro" id="marker">

  <a-video
    src="#video"
    width="2"
    height="1"
    position="0 0 0"
    rotation="-90 0 0"
  ></a-video>

</a-marker>

<a-entity camera></a-entity>
</a-scene>

<script>
const marker = document.querySelector("#marker");
const video = document.querySelector("#video");

const fact = document.getElementById("fact");
const quiz = document.getElementById("quiz");
const result = document.getElementById("result");

// Видео старт / стоп
marker.addEventListener("markerFound", () => {
  video.play();
});

marker.addEventListener("markerLost", () => {
  video.pause();
});

// После видео → факт
video.addEventListener("ended", () => {
  fact.style.display = "block";
});

// Показать вопрос
function showQuiz() {
  fact.style.display = "none";
  quiz.style.display = "block";
}

// Проверка ответа
function checkAnswer(num) {
  if (num === 1) {
    result.innerHTML = "🎉 Правильно! Крокодилы жили ещё во времена динозавров.";
    result.style.color = "green";
  } else {
    result.innerHTML = "❌ Не совсем. Попробуй ещё!";
    result.style.color = "red";
  }
}
</script>

</body>
</html>
