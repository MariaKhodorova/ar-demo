<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AR Динозавры</title>

<!-- MindAR + A-Frame -->
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Segoe UI', sans-serif;
  background: #000;
}

/* overlay panels — поверх канваса MindAR */
#ui-layer {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 16px;
}

.panel {
  display: none;
  background: linear-gradient(135deg, #ffffff, #f3f7ff);
  padding: 18px;
  border-radius: 18px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.25);
  animation: fadeUp 0.4s ease;
  pointer-events: all;
  margin-bottom: 8px;
}
.panel h3 {
  margin: 0 0 10px;
  font-size: 18px;
}
.panel p {
  margin: 0 0 10px;
  font-size: 15px;
  color: #333;
}

button {
  display: block;
  width: 100%;
  margin-top: 8px;
  padding: 13px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, #4CAF50, #66bb6a);
  color: #fff;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.15s;
}
button:active { transform: scale(0.97); }

#result {
  margin-top: 12px;
  font-weight: bold;
  font-size: 15px;
}

#scanning-hint {
  text-align: center;
  color: rgba(255,255,255,0.85);
  font-size: 14px;
  letter-spacing: 0.5px;
  padding-bottom: 12px;
  pointer-events: none;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<!-- UI поверх AR-сцены -->
<div id="ui-layer">
  <p id="scanning-hint">📷 Наведи камеру на картинку-маркер</p>

  <div id="fact" class="panel">
    <h3>🌿 Интересный факт</h3>
    <p>Гинкго видело динозавров. Ему может быть до 3000 лет!</p>
    <button onclick="showQuiz()">Дальше ➡️</button>
  </div>

  <div id="quiz" class="panel">
    <h3>🦖 Что ещё жило во времена динозавров?</h3>
    <button onclick="checkAnswer(1)">🐊 Крокодилы</button>
    <button onclick="checkAnswer(2)">🐱 Кошки</button>
    <button onclick="checkAnswer(3)">🐶 Собаки</button>
    <button onclick="checkAnswer(4)">🐄 Коровы</button>
    <div id="result"></div>
  </div>
</div>

<!-- MindAR A-Frame сцена -->
<a-scene
  mindar-image="imageTargetSrc: targets.mind; autoStart: true; uiLoading: yes; uiScanning: no; uiError: yes;"
  color-space="sRGB"
  renderer="colorManagement: true; physicallyCorrectLights: true;"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
>
  <a-assets>
    <!--
      Положи dino.mp4 рядом с index.html.
      crossorigin нужен если файл отдаётся с другого домена.
    -->
    <video
      id="dino-video"
      src="dino.mp4"
      preload="auto"
      playsinline
      webkit-playsinline
      muted
      loop="false"
    ></video>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <!--
    mindar-image-target index="0" — первый (и единственный) таргет в targets.mind.
    Если у тебя несколько — меняй index.
  -->
  <a-entity mindar-image-target="targetIndex: 0" id="ar-target">
    <!--
      Видео-плоскость.
      width/height подбери под соотношение сторон своего видео.
      Стандартное 16:9 → width=1, height=0.5625  (или 1.6 / 0.9).
      position="0 0 0" — центр маркера.
      rotation="-90 0 0" не нужен в MindAR (плоскость уже горизонтальная по умолчанию).
    -->
    <a-video
      id="ar-video"
      src="#dino-video"
      width="1"
      height="0.5625"
      position="0 0 0"
    ></a-video>
  </a-entity>
</a-scene>

<script>
  const target   = document.querySelector('#ar-target');
  const video    = document.querySelector('#dino-video');
  const hint     = document.querySelector('#scanning-hint');
  const factEl   = document.querySelector('#fact');
  const quizEl   = document.querySelector('#quiz');
  const resultEl = document.querySelector('#result');

  // --- маркер найден ---
  target.addEventListener('targetFound', () => {
    hint.style.display = 'none';
    video.muted = false;          // включи звук если нужен
    video.play().catch(e => {
      // автовоспроизведение со звуком блокируется браузером — оставляем muted
      video.muted = true;
      video.play();
    });
  });

  // --- маркер потерян ---
  target.addEventListener('targetLost', () => {
    hint.style.display = 'block';
    video.pause();
  });

  // --- видео закончилось → показываем факт ---
  video.addEventListener('ended', () => {
    factEl.style.display = 'block';
  });

  function showQuiz() {
    factEl.style.display = 'none';
    quizEl.style.display = 'block';
  }

  function checkAnswer(num) {
    if (num === 1) {
      resultEl.innerHTML = '🎉 Правильно! Крокодилы жили вместе с динозаврами.';
      resultEl.style.color = 'green';
    } else {
      resultEl.innerHTML = '❌ Почти! Попробуй ещё 😊';
      resultEl.style.color = 'red';
    }
  }
</script>
</body>
</html>
