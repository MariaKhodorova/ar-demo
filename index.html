<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AR Цветок</title>

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

<style>
#fact, #question {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.7);
  color: white;
  padding: 12px 18px;
  border-radius: 10px;
  font-family: sans-serif;
  display: none;
}

#fact { bottom: 80px; }
#question { bottom: 20px; }
</style>

</head>

<body style="margin:0; overflow:hidden;">

<div id="fact">
Цветёт только ночью, цветок живёт один день
</div>

<div id="question">
Почему растению выгодно цвести ночью?
</div>

<a-scene
embedded
arjs="sourceType: webcam; debugUIEnabled: false;"
vr-mode-ui="enabled: false"
>

<!-- Свет -->
<a-entity id="light" light="type: directional; intensity: 1"></a-entity>

<a-marker preset="hiro">

<a-entity rotation="-90 0 0">

<a-entity
id="flower"
gltf-model="Cactus.glb"
position="0 0 0"
scale="0.5 0.5 0.5"
visible="false"
></a-entity>

</a-entity>
</a-marker>

<a-entity camera></a-entity>

</a-scene>

<script>
const flower = document.querySelector('#flower');
const light = document.querySelector('#light');
const fact = document.getElementById('fact');
const question = document.getElementById('question');

// ⏱ Таймлайн (можешь менять длительность)
setTimeout(startNight, 2000);      // ночь через 2 сек

function startNight() {
  console.log("Ночь");

  light.setAttribute('light', 'intensity', 0.2);

  flower.setAttribute('visible', true);

  // 🌸 Расцвет
  flower.setAttribute('animation__scale', {
    property: 'scale',
    to: '1 1 1',
    dur: 3000,
    easing: 'easeOutElastic'
  });

  fact.style.display = 'block';

  setTimeout(wiltFlower, 5000);
}

function wiltFlower() {
  console.log("Увядание");

  flower.setAttribute('animation__wilt', {
    property: 'rotation',
    to: '0 0 90',
    dur: 3000
  });

  flower.setAttribute('animation__shrink', {
    property: 'scale',
    to: '0.2 0.2 0.2',
    dur: 3000
  });

  setTimeout(showQuestion, 2000);
  setTimeout(startDay, 5000);
}

function showQuestion() {
  question.style.display = 'block';
}

function startDay() {
  console.log("День");

  light.setAttribute('light', 'intensity', 1);

  flower.setAttribute('visible', false);

  fact.style.display = 'none';
  question.style.display = 'none';
}
</script>

</body>
</html>
