<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>AR Кактус</title>
<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,400&family=Cinzel:wght@400;600&display=swap" rel="stylesheet"/>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { overflow:hidden; font-family:'Cormorant Garamond',Georgia,serif; }

/* ── overlay sky tint ── */
#sky {
  position:fixed; inset:0; z-index:5;
  pointer-events:none;
  background: radial-gradient(ellipse at 20% 10%, rgba(255,220,80,0.18) 0%, transparent 60%);
  transition: background 3s ease;
}

/* ── stars canvas ── */
#stars-canvas {
  position:fixed; inset:0; z-index:6;
  pointer-events:none; opacity:0;
  transition: opacity 2s ease;
}

/* ── phase label ── */
#phase {
  position:fixed; top:22px; left:50%; transform:translateX(-50%);
  z-index:30;
  font-family:'Cinzel',serif;
  font-size:12px; letter-spacing:5px; text-transform:uppercase;
  color:#fff; text-shadow:0 0 16px rgba(0,0,0,0.8);
  background:rgba(0,0,0,0.3); backdrop-filter:blur(8px);
  padding:6px 20px; border-radius:20px;
  opacity:0; transition:opacity 1s ease;
  white-space:nowrap;
}

/* ── fact card ── */
#fact {
  position:fixed; bottom:80px; left:50%; transform:translateX(-50%) translateY(16px);
  z-index:30; width:min(460px,90vw);
  background:rgba(4,6,28,0.85); backdrop-filter:blur(16px);
  border:1px solid rgba(180,140,255,0.28);
  border-radius:20px; padding:18px 26px;
  text-align:center;
  box-shadow:0 0 40px rgba(120,60,220,0.25), inset 0 1px 0 rgba(255,255,255,0.07);
  opacity:0; pointer-events:none;
  transition:opacity 1.4s ease, transform 1.4s ease;
}
#fact.show { opacity:1; transform:translateX(-50%) translateY(0); pointer-events:auto; }
#fact .fi { font-size:22px; margin-bottom:6px; }
#fact .fl { font-family:'Cinzel',serif; font-size:9px; letter-spacing:4px; color:#a880f0; text-transform:uppercase; margin-bottom:8px; }
#fact .ft { font-size:clamp(14px,3.8vw,17px); font-style:italic; color:#ede8ff; line-height:1.55; }

/* ── question ── */
#qwrap {
  position:fixed; inset:0; z-index:40;
  display:flex; align-items:center; justify-content:center;
  background:rgba(1,2,14,0.68); backdrop-filter:blur(10px);
  opacity:0; pointer-events:none;
  transition:opacity 0.9s ease;
}
#qwrap.show { opacity:1; pointer-events:auto; }
#qbox {
  width:min(460px,88vw);
  background:linear-gradient(150deg,#07062e,#140930);
  border:1px solid rgba(200,120,255,0.32);
  border-radius:26px; padding:44px 34px 32px; text-align:center;
  box-shadow:0 12px 60px rgba(100,40,200,0.35);
  opacity:0; transform:translateY(32px) scale(0.95);
  transition:all 0.85s cubic-bezier(0.34,1.4,0.64,1);
}
#qwrap.show #qbox { opacity:1; transform:none; }
#qbox .qg { font-size:46px; margin-bottom:14px; filter:drop-shadow(0 0 16px #ff88cc); }
#qbox .ql { font-family:'Cinzel',serif; font-size:9px; letter-spacing:5px; color:#b080ff; text-transform:uppercase; margin-bottom:18px; }
#qbox .qt { font-size:clamp(16px,4vw,20px); color:#efe8ff; line-height:1.65; margin-bottom:28px; font-style:italic; }
#qbox button {
  font-family:'Cinzel',serif; font-size:12px; letter-spacing:2px;
  background:linear-gradient(130deg,#5015b8,#b040ff);
  color:#fff; border:none; border-radius:50px;
  padding:12px 32px; cursor:pointer;
  box-shadow:0 4px 24px rgba(160,50,255,0.5);
  transition:transform 0.2s, box-shadow 0.2s;
}
#qbox button:hover { transform:scale(1.06); box-shadow:0 6px 32px rgba(160,50,255,0.7); }

/* ── progress ── */
#bar {
  position:fixed; bottom:0; left:0; height:3px; width:0%;
  background:linear-gradient(90deg,#ffe066,#ff6030,#c040ff,#40aaff,#ffe066);
  background-size:300% 100%;
  animation:barmove 14s linear infinite;
  box-shadow:0 0 8px rgba(200,100,255,0.5);
  transition:width 0.4s linear; z-index:50;
}
@keyframes barmove { to{background-position:300% 0} }
</style>
</head>
<body>

<div id="sky"></div>
<canvas id="stars-canvas"></canvas>
<div id="phase"></div>

<div id="fact">
  <div class="fi">🌙</div>
  <div class="fl">Факт о кактусе</div>
  <div class="ft">Цветёт только ночью — цветок живёт один день</div>
</div>

<div id="qwrap">
  <div id="qbox">
    <div class="qg">🌺</div>
    <div class="ql">Вопрос для размышления</div>
    <div class="qt">Почему растению выгодно цвести ночью?</div>
    <button onclick="document.getElementById('qwrap').classList.remove('show')">Задумаюсь об этом ✨</button>
  </div>
</div>

<div id="bar"></div>

<!-- ═══ STARS CANVAS ════════════════════════════════════ -->
<script>
(function(){
  const c=document.getElementById('stars-canvas');
  const ctx=c.getContext('2d');
  const stars=[];
  function resize(){ c.width=innerWidth; c.height=innerHeight; }
  resize(); window.addEventListener('resize',resize);
  for(let i=0;i<160;i++) stars.push({
    x:Math.random(), y:Math.random()*0.8,
    r:Math.random()*1.6+0.3,
    ph:Math.random()*Math.PI*2,
    sp:Math.random()*0.6+0.3
  });
  let starsAlpha=0;
  window._setStars=function(a){ starsAlpha=a; };
  (function loop(t){
    ctx.clearRect(0,0,c.width,c.height);
    if(starsAlpha>0){
      stars.forEach(s=>{
        const tw=0.5+0.5*Math.sin(t*0.001*s.sp+s.ph);
        ctx.save();
        ctx.globalAlpha=starsAlpha*tw;
        ctx.beginPath();
        ctx.arc(s.x*c.width,s.y*c.height,s.r,0,Math.PI*2);
        ctx.fillStyle='#ffffff';
        ctx.fill();
        const g=ctx.createRadialGradient(s.x*c.width,s.y*c.height,0,s.x*c.width,s.y*c.height,s.r*5);
        g.addColorStop(0,'rgba(200,200,255,0.4)');
        g.addColorStop(1,'transparent');
        ctx.globalAlpha=starsAlpha*tw*0.35;
        ctx.beginPath();
        ctx.arc(s.x*c.width,s.y*c.height,s.r*5,0,Math.PI*2);
        ctx.fillStyle=g; ctx.fill();
        ctx.restore();
      });
    }
    requestAnimationFrame(loop);
  })(0);
})();
</script>

<!-- ═══ PHASE STATE MACHINE ══════════════════════════════ -->
<script>
// ── Helpers ───────────────────────────────────────────
function lerp(a,b,t){ return a+(b-a)*t; }
function el(id){ return document.getElementById(id); }
function setAttr(id,attr,val){ const e=el(id); if(e) e.setAttribute(attr,val); }
function setVis(id,v){ const e=el(id); if(e) e.setAttribute('visible',v); }

// ── Phases ────────────────────────────────────────────
const PHASES=[
  {name:'🌞  День',    dur:6000},
  {name:'🌅  Закат',   dur:5000},
  {name:'🌙  Ночь',    dur:6000},
  {name:'🌺  Цветок расцвёл', dur:5500},
  {name:'🌄  Рассвет', dur:5000},
  {name:'✨  Новый день',dur:5000},
];
const TOTAL=PHASES.reduce((a,p)=>a+p.dur,0);

const skyEl    = el('sky');
const phaseEl  = el('phase');
const factEl   = el('fact');
const qEl      = el('qwrap');
const barEl    = el('bar');
const starsC   = el('stars-canvas');

let startTime=null, lastPhase=-1, questionShown=false;

function showPhase(name){
  phaseEl.textContent=name;
  phaseEl.style.opacity='1';
  setTimeout(()=>phaseEl.style.opacity='0',2400);
}

// Sky overlay backgrounds per phase
const SKY_STYLES=[
  // day
  'radial-gradient(ellipse at 15% 8%, rgba(255,220,80,0.22) 0%, transparent 55%)',
  // sunset
  'linear-gradient(180deg, rgba(200,60,20,0.35) 0%, rgba(255,130,30,0.5) 100%)',
  // night
  'rgba(2,4,20,0.55)',
  // bloom (night)
  'rgba(2,4,20,0.55)',
  // dawn
  'linear-gradient(180deg, rgba(80,10,30,0.4) 0%, rgba(220,80,40,0.45) 100%)',
  // new day
  'radial-gradient(ellipse at 15% 8%, rgba(255,220,80,0.22) 0%, transparent 55%)',
];

function applyPhase(pi, blend){
  // sky
  skyEl.style.background=SKY_STYLES[pi];

  // stars
  const starA=
    pi===1?blend*0.8:
    pi===2?0.8+blend*0.2:
    pi===3?1:
    pi===4?Math.max(1-blend*0.7,0):0;
  starsC.style.opacity=String(starA);
  if(window._setStars) window._setStars(starA);

  // day light intensity
  const dayInt=
    pi===0?1.0:
    pi===1?lerp(1,0.3,blend):
    pi===2||pi===3?0.1:
    pi===4?lerp(0.1,0.8,blend):
    1.0;
  setAttr('day-light','intensity',dayInt);

  // night ambient
  const nightInt=
    pi===1?lerp(0,0.6,blend):
    pi===2||pi===3?0.6:
    pi===4?lerp(0.6,0,blend):0;
  setAttr('night-ambient','intensity',nightInt);
  setAttr('night-ambient','color', pi>=2&&pi<=4?'#1a0840':'#ffffff');

  // cactus visibility
  setVis('ar-root', pi!==5);

  // flower
  const flowerOn=(pi===2&&blend>0.4)||pi===3||(pi===4&&blend<0.85);
  setVis('flower-group', flowerOn);

  // wither: scale down petals on dawn
  if(pi===4){
    const ws=Math.max(1-blend*0.8,0.1);
    const fg=el('flower-group');
    if(fg) fg.setAttribute('scale',`${ws} ${ws} ${ws}`);
  } else if(pi===2||pi===3){
    const fg=el('flower-group');
    if(fg) fg.setAttribute('scale','1 1 1');
  }

  // bloom glow intensity
  const bloomInt=
    pi===2?Math.min((blend-0.4)/0.6,1)*0.8:
    pi===3?0.8:
    pi===4?Math.max(0.8-blend*0.8,0):0;
  setAttr('bloom-light','intensity',bloomInt);
}

function onEnter(pi){
  showPhase(PHASES[pi].name);
  if(pi===2) setTimeout(()=>factEl.classList.add('show'),2200);
  if(pi===3&&!questionShown){ questionShown=true; setTimeout(()=>qEl.classList.add('show'),1200); }
  if(pi===4){ factEl.classList.remove('show'); }
}

// ── Main loop ─────────────────────────────────────────
function tick(ts){
  if(!startTime) startTime=ts;
  const elapsed=ts-startTime;
  const prog=Math.min(elapsed/TOTAL,1);
  barEl.style.width=(prog*100)+'%';

  let acc=0,pi=0,pe=0;
  for(let i=0;i<PHASES.length;i++){
    if(elapsed<acc+PHASES[i].dur){ pi=i; pe=elapsed-acc; break; }
    acc+=PHASES[i].dur;
    if(i===PHASES.length-1){ pi=i; pe=PHASES[i].dur; }
  }
  const blend=Math.min(pe/PHASES[pi].dur,1);

  if(pi!==lastPhase){ onEnter(pi); lastPhase=pi; }
  applyPhase(pi,blend);

  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);
</script>

</body>
</html>
