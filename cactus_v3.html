<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AR Цветок</title>

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: sans-serif;
}

/* Вопрос */
#quiz {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  display: none;
  justify-content: center;
  padding: 20px;
}

/* Карточка */
.card {
  background: linear-gradient(135deg, #ffffff, #e8f5e9);
  border-radius: 20px;
  padding: 20px;
  width: 100%;
  max-width: 400px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.25);
  text-align: center;
}

/* Заголовок */
.card h2 {
  margin-bottom: 15px;
}

/* Кнопки */
button {
  width: 100%;
  margin: 8px 0;
  padding: 12px;
  border: none;
  border-radius: 12px;
  background: #4CAF50;
  color: white;
  font-size: 16px;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
}

button:active {
  transform: scale(0.95);
}

/* Анимация появления */
#quiz.show {
  display: flex;
  animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(50px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>

</head>

<body>

<!-- ВОПРОС -->
<div id="quiz">
  <div class="card">
    <h2>🌙 Почему растению выгодно цвести ночью?</h2>

    <button onclick="checkAnswer(1)">Меньше солнечного света</button>
    <button onclick="checkAnswer(2)">🦇 Активны ночные опылители</button>
    <button onclick="checkAnswer(3)">Прохладнее</button>
    <button onclick="checkAnswer(4)">Нет ветра</button>
  </div>
</div>

<a-scene
embedded
arjs="sourceType: webcam; debugUIEnabled: false;"
vr-mode-ui="enabled: false"
>

<a-assets>
  <video 
    id="video"
    src="cactus.mp4"
    preload="auto"
    crossorigin="anonymous"
    muted
    playsinline
    webkit-playsinline
  ></video>
</a-assets>

<a-marker preset="hiro" id="marker">

  <!-- Фон под видео -->
  <a-plane 
    width="2.2" 
    height="1.3" 
    color="#000" 
    position="0 -0.01 0"
    rotation="-90 0 0">
  </a-plane>

  <!-- Видео -->
  <a-video
    id="videoPlane"
    src="#video"
    width="2"
    height="1.125"
    position="0 0 0"
    rotation="-90 0 0"
    material="shader: flat"
  ></a-video>

</a-marker>

<a-entity camera></a-entity>
</a-scene>

<script>
const marker = document.querySelector("#marker");
const video = document.querySelector("#video");
const quiz = document.getElementById("quiz");
const videoPlane = document.querySelector("#videoPlane");

// Разблокировка видео (важно для мобильных)
document.body.addEventListener('click', () => {
  video.play();
  video.pause();
}, { once: true });

// Запуск видео
marker.addEventListener("markerFound", () => {
  video.currentTime = 0;
  video.play();
});

// Пауза если маркер исчез
marker.addEventListener("markerLost", () => {
  video.pause();
});

// АДАПТАЦИЯ ПОД ПРОПОРЦИИ ВИДЕО
video.addEventListener("loadedmetadata", () => {
  const ratio = video.videoWidth / video.videoHeight;
  videoPlane.setAttribute("width", 2);
  videoPlane.setAttribute("height", 2 / ratio);
});

// Когда видео закончилось → показать вопрос
video.addEventListener("ended", () => {
  quiz.classList.add("show");
});

// Проверка ответа
function checkAnswer(num) {
  const buttons = document.querySelectorAll("button");

  buttons.forEach((btn, index) => {
    if (index === 1) {
      btn.style.background = "green";
    } else {
      btn.style.background = "red";
    }
  });

  if (num === 2) {
    setTimeout(() => alert("Правильно! 🎉"), 200);
  } else {
    setTimeout(() => alert("Попробуй ещё 😊"), 200);
  }
}
</script>

</body>
</html>
